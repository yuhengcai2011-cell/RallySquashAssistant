<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rally Squash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{--green:#2e7d32;--bg:#fafafa;--user:#dcf8c6;--rally:#fff;--border:#e0e0e0}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .header{padding:12px 16px;background:#fff;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:18px;color:var(--green)}
        .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
        .msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;word-wrap:break-word}
        .msg.user{align-self:flex-end;background:var(--user)}
        .msg.rally{align-self:flex-start;background:var(--rally);border:1px solid var(--border)}
        .quick{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;background:#fff;border-top:1px solid var(--border);-webkit-overflow-scrolling:touch}
        .quick-btn{flex-shrink:0;padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:13px;cursor:pointer}
        .input-area{display:flex;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid var(--border);padding-bottom:calc(12px + env(safe-area-inset-bottom))}
        .input-area input{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:24px;font-size:14px;outline:none}
        .send-btn{padding:10px 20px;border:none;border-radius:24px;background:var(--green);color:#fff;font-size:14px;font-weight:bold;cursor:pointer}
    </style>
</head>
<body>

<div class="header">
    <h1>🎾 Rally Dashboard</h1>
    <button onclick="location.reload()" style="border:none;background:none;font-size:18px">🔄</button>
</div>

<div class="messages" id="messages">
    <div class="msg rally">Welcome back! Use the buttons below or type a command to interact with your agent.</div>
</div>

<div class="quick">
    <button class="quick-btn" onclick="quick('Workout schedule')">🏋️ Workout</button>
    <button class="quick-btn" onclick="quick('HK rankings')">🏆 Rankings</button>
    <button class="quick-btn" onclick="quick('Fun fact')">💡 Fact</button>
    <button class="quick-btn" onclick="quick('Training tip')">🎯 Tips</button>
    <button class="quick-btn" onclick="quick('Status update')">📈 Status</button>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Message agent..." onkeydown="if(event.key=='Enter')send()">
    <button class="send-btn" onclick="send()">Send</button>
</div>

<script>
    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); // Full screen mode
    tg.ready();

    // The messages container
    const msgContainer = document.getElementById('messages');

    /**
     * Sends data back to the Telegram Bot
     * In a Mini App, this sends a service message that the bot 
     * perceives as coming directly from the human user.
     */
    function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        
        if (!text) return;

        // 1. Show message in the UI locally
        addMsg('user', text);
        
        // 2. Send the string to the bot via the Official Telegram bridge
        // This is the "Magic" that fixes bot-to-bot blocking
        tg.sendData(text);

        // 3. Clear input
        input.value = '';
    }

    /**
     * Helper to add bubbles to the screen
     */
    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        msgContainer.appendChild(div);
        
        // Auto-scroll to bottom
        div.scrollIntoView({ behavior: 'smooth' });
    }

    /**
     * Helper for Quick-Access buttons
     */
    function quick(q) {
        addMsg('user', q);
        tg.sendData(q);
    }

    // Set UI colors based on Telegram Theme
    document.documentElement.style.setProperty('--bg', tg.backgroundColor || '#fafafa');
    document.body.style.color = tg.textColor || '#000';
</script>
</body>
</html>
